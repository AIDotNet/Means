version: 1
service: means-object-storage
protocol: s3-compatible
defaults:
  region: us-east-1
  service: s3
  signingAlgorithm: AWS4-HMAC-SHA256
  payloadHash: UNSIGNED-PAYLOAD
addressing:
  pathStyle:
    template: "https://api.means.local/{bucket}/{key}"
  virtualHostedStyle:
    template: "https://{bucket}.means.local/{key}"
authentication:
  server:
    modes:
      - sigv4-header
      - sigv4-query
      - anonymous-policy
    presign:
      maxExpiresSeconds: 604800
  browser:
    modes:
      - anonymous-policy
      - presigned-url
    disallowSecretKeySigning: true
naming:
  bucket:
    minLength: 3
    maxLength: 63
    allowedCharacters: "a-z 0-9 - ."
    mustStartAndEndWith: letter-or-digit
    rejectConsecutiveDots: true
    rejectDotHyphenPairs: true
    rejectIpv4AddressShape: true
  objectKey:
    minUtf8Bytes: 1
    maxUtf8Bytes: 1024
    rejectControlCharacters: true
operations:
  listBuckets:
    method: GET
    path: "/"
    auth: signed
    responseXml: ListAllMyBucketsResult
  createBucket:
    method: PUT
    path: "/{bucket}"
    auth: signed
  headBucket:
    method: HEAD
    path: "/{bucket}"
    auth: signed-or-policy
  deleteBucket:
    method: DELETE
    path: "/{bucket}"
    auth: signed
  getBucketVersioning:
    method: GET
    path: "/{bucket}"
    query:
      versioning: ""
    auth: signed
    responseXml: VersioningConfiguration
  putBucketVersioning:
    method: PUT
    path: "/{bucket}"
    query:
      versioning: ""
    auth: signed
    requestXml: VersioningConfiguration
  getBucketLifecycle:
    method: GET
    path: "/{bucket}"
    query:
      lifecycle: ""
    auth: signed
    responseXml: LifecycleConfiguration
  putBucketLifecycle:
    method: PUT
    path: "/{bucket}"
    query:
      lifecycle: ""
    auth: signed
    requestXml: LifecycleConfiguration
  deleteBucketLifecycle:
    method: DELETE
    path: "/{bucket}"
    query:
      lifecycle: ""
    auth: signed
  listObjects:
    method: GET
    path: "/{bucket}"
    query:
      list-type: "2"
      prefix: optional
      delimiter: optional
      continuation-token: optional
      max-keys: optional
    auth: signed-or-policy
    responseXml: ListBucketResult
  listObjectVersions:
    method: GET
    path: "/{bucket}"
    query:
      versions: ""
      prefix: optional
      delimiter: optional
      key-marker: optional
      version-id-marker: optional
      max-keys: optional
    auth: signed-or-policy
    responseXml: ListVersionsResult
  putObject:
    method: PUT
    path: "/{bucket}/{key}"
    auth: signed-or-policy
    requestHeaders:
      Content-Type: optional
      Cache-Control: optional
      Content-Disposition: optional
      x-amz-meta-*: optional
    responseHeaders:
      ETag: required
  getObject:
    method: GET
    path: "/{bucket}/{key}"
    query:
      versionId: optional
    auth: signed-or-policy
    responseHeaders:
      ETag: required
      Last-Modified: required
      Content-Length: required
      Content-Type: required
      Accept-Ranges: required
      Content-Encoding: optional
      Vary: optional
      x-amz-meta-*: optional
  headObject:
    method: HEAD
    path: "/{bucket}/{key}"
    query:
      versionId: optional
    auth: signed-or-policy
    responseHeaders:
      ETag: required
      Last-Modified: required
      Content-Length: required
      Content-Type: required
      Accept-Ranges: required
      x-amz-meta-*: optional
  deleteObject:
    method: DELETE
    path: "/{bucket}/{key}"
    query:
      versionId: optional
    auth: signed-or-policy
  getObjectTagging:
    method: GET
    path: "/{bucket}/{key}"
    query:
      tagging: ""
      versionId: optional
    auth: signed-or-policy
    responseXml: Tagging
  putObjectTagging:
    method: PUT
    path: "/{bucket}/{key}"
    query:
      tagging: ""
      versionId: optional
    auth: signed-or-policy
    requestXml: Tagging
  deleteObjectTagging:
    method: DELETE
    path: "/{bucket}/{key}"
    query:
      tagging: ""
      versionId: optional
    auth: signed-or-policy
  copyObject:
    method: PUT
    path: "/{bucket}/{key}"
    auth: signed-or-policy
    requestHeaders:
      x-amz-copy-source: required
      x-amz-metadata-directive: optional
      Content-Type: optional
      Cache-Control: optional
      Content-Disposition: optional
      x-amz-meta-*: optional
    responseXml: CopyObjectResult
  getBucketCors:
    method: GET
    path: "/{bucket}"
    query:
      cors: ""
    auth: signed-or-policy
    responseXml: CORSConfiguration
  putBucketCors:
    method: PUT
    path: "/{bucket}"
    query:
      cors: ""
    auth: signed
    requestXml: CORSConfiguration
  deleteBucketCors:
    method: DELETE
    path: "/{bucket}"
    query:
      cors: ""
    auth: signed
  getBucketNotification:
    method: GET
    path: "/{bucket}"
    query:
      notification: ""
    auth: signed-or-policy
    responseXml: NotificationConfiguration
  putBucketNotification:
    method: PUT
    path: "/{bucket}"
    query:
      notification: ""
    auth: signed
    requestXml: NotificationConfiguration
  deleteBucketNotification:
    method: DELETE
    path: "/{bucket}"
    query:
      notification: ""
    auth: signed
  initiateMultipartUpload:
    method: POST
    path: "/{bucket}/{key}"
    query:
      uploads: ""
    auth: signed-or-policy
    requestHeaders:
      Content-Type: optional
      Cache-Control: optional
      Content-Disposition: optional
      x-amz-meta-*: optional
    responseXml: InitiateMultipartUploadResult
  uploadPart:
    method: PUT
    path: "/{bucket}/{key}"
    query:
      partNumber: required
      uploadId: required
    auth: signed-or-policy
    responseHeaders:
      ETag: required
  uploadPartCopy:
    method: PUT
    path: "/{bucket}/{key}"
    query:
      partNumber: required
      uploadId: required
    auth: signed-or-policy
    requestHeaders:
      x-amz-copy-source: required
      x-amz-copy-source-range: optional
    responseXml: CopyPartResult
  completeMultipartUpload:
    method: POST
    path: "/{bucket}/{key}"
    query:
      uploadId: required
    requestXml: CompleteMultipartUpload
    auth: signed-or-policy
    responseXml: CompleteMultipartUploadResult
  abortMultipartUpload:
    method: DELETE
    path: "/{bucket}/{key}"
    query:
      uploadId: required
    auth: signed-or-policy
  listParts:
    method: GET
    path: "/{bucket}/{key}"
    query:
      uploadId: required
      part-number-marker: optional
      max-parts: optional
    auth: signed-or-policy
    responseXml: ListPartsResult
  listMultipartUploads:
    method: GET
    path: "/{bucket}"
    query:
      uploads: ""
      prefix: optional
      delimiter: optional
      key-marker: optional
      upload-id-marker: optional
      max-uploads: optional
    auth: signed-or-policy
    responseXml: ListMultipartUploadsResult
  createPresignedGetUrl:
    method: GET
    path: "/{bucket}/{key}"
    query:
      versionId: optional
    auth: local-signing
  createPresignedPutUrl:
    method: PUT
    path: "/{bucket}/{key}"
    auth: local-signing
  createPresignedUploadPartUrl:
    method: PUT
    path: "/{bucket}/{key}"
    query:
      partNumber: required
      uploadId: required
    auth: local-signing
errors:
  - AccessDenied
  - BucketAlreadyExists
  - BucketNotEmpty
  - EntityTooLarge
  - EntityTooSmall
  - InvalidArgument
  - InvalidPart
  - InvalidPartOrder
  - InvalidRange
  - InvalidRequest
  - MalformedXML
  - NoSuchBucket
  - NoSuchCORSConfiguration
  - NoSuchLifecycleConfiguration
  - NoSuchKey
  - NoSuchUpload
  - NoSuchVersion
  - PreconditionFailed
  - SignatureDoesNotMatch
multipartUpload:
  partNumber:
    min: 1
    max: 10000
  minimumNonFinalPartBytes: 5242880
  defaultSdkPartBytes: 16777216
  etag: "md5(concat(part-md5-bytes))-part-count"
versioning:
  statuses:
    - Off
    - Enabled
    - Suspended
  deleteMarker: true
lifecycle:
  supportedRules:
    - Expiration.Days
    - NoncurrentVersionExpiration.NoncurrentDays
    - AbortIncompleteMultipartUpload.DaysAfterInitiation
bucketPolicy:
  jsonShape:
    Version: optional
    Statement:
      Effect: Allow|Deny
      Principal: "*"|"access-key"|{"AWS":"access-key"}
      Action:
        - s3:ListBucket
        - s3:GetObject
        - s3:PutObject
        - s3:DeleteObject
        - s3:GetObjectTagging
        - s3:PutObjectTagging
        - s3:DeleteObjectTagging
        - s3:GetBucketCORS
        - s3:PutBucketCORS
        - s3:GetBucketNotification
        - s3:PutBucketNotification
        - s3:AbortMultipartUpload
        - s3:ListMultipartUploadParts
      Resource:
        - "arn:aws:s3:::bucket"
        - "arn:aws:s3:::bucket/*"
compression:
  encodings:
    - br
    - gzip
  varyHeader: Accept-Encoding
  disableForRange: true
  invalidRange:
    statusCode: 416
    errorCode: InvalidRange
    contentRange: "bytes */{object-length}"
  etag:
    original: strong-md5
    compressed: weak-with-encoding-suffix
